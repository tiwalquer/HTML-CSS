<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>



    <style>




        table{
            width: 70%;
            margin: 10px;
            border-collapse: collapse;
            
        }
        th, td{
            padding: 5px;
            text-align: center;

            border: 2px solid black;
            

        }

    </style>
</head>

<body>
    
    <table>
        <caption>trajetoria academica</caption>
        
        <tr >
            <th rowspan="2">Estudantes</th>
            <th colspan="2">Formacao</th>
            <th rowspan="2">Ano de conclusao</th>

        </tr>

        <tr>
            <th>graduacao</th>
            <th>Pos-graduacao</th>
        </tr>

        <tr>
            <th>jose</th>
            <td>ciencia da computacao</td>
            <td>inteligencia artificial</td>
            <td>2023</td>
        </tr>

        <tr>
            <th>ana</th>
            <td>engenharia de software</td>
            <td>gestao de projetos</td>
            <td>2024</td>
        </tr>

    </table>



</body>

</html>
